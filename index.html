<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雕光摄影 · 摄影社团</title>
  <meta name="description" content="雕光摄影 —— 以光影为笔，雕琢瞬间。摄影社团作品展示。" />
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 顶部：Logo + 毛玻璃导航 -->
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="雕光摄影 首页">
      <img class="logo-img" src="assets/logo.jpg" alt="雕光摄影 印章 logo" />
      <span class="logo-text">雕光摄影</span>
    </a>
    <nav class="nav" aria-label="主导航">
      <a href="index.html">首页</a>
      <span class="nav-divider"></span>
      <a href="works.html">作品</a>
      <span class="nav-divider"></span>
      <a href="about.html">关于</a>
      <span class="nav-divider"></span>
      <a href="contact.html">联系</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero container">
    <span class="eyebrow">Photography Club</span>
    <h1>以光为笔<span class="accent-dot">·</span>雕琢瞬间</h1>
    <p>雕光摄影是一个以光影记录生活的摄影社团。我们相信每一次按下快门，都是对时间的温柔雕刻。</p>
  </section>

  <!-- 作品展示 -->
  <section class="container">
    <div class="section-head">
      <h2>作品展示</h2>
      <span class="count" id="works-count">共 64 件</span>
    </div>

    <div class="works-grid" id="works-grid">
      <!-- 作品卡片由 js/main.js 从 works_manifest.json 动态渲染 -->
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="container">
      <span class="brand-mark">雕光摄影</span>
      <span>© 2026 雕光摄影摄影社团 · 以光为笔，雕琢瞬间</span>
    </div>
  </footer>

  <!-- 预览灯箱 -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="作品预览">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lb-close" type="button" aria-label="关闭预览">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <div class="lightbox-img" id="lb-img">
        <img class="lightbox-photo" id="lb-img-el" src="" alt="" />
      </div>
      <div class="lightbox-cap"><span id="lb-title">作品</span><span id="lb-sub" style="color:var(--text-muted);font-size:13px;letter-spacing:1px;">预览</span></div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
