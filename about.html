        <p class="lead">我们用镜头收藏光，<br />让每一帧都成为可以回放的时间。</p>
        <p>雕光摄影成立于光影交错的某一个清晨。社团聚集了一群热爱记录的年轻人，从街角的一束斜阳，到山野里漫过的薄雾，我们试图在快门起落之间，留住那些容易被遗忘的细小瞬间。</p>
        <p>我们不追求器材的昂贵，更在意观看的方式。每一次外拍、每一场分享，都是一次重新认识世界的机会。如果你也愿意慢下来，和我们一起把日子拍成诗，欢迎加入。</p>
